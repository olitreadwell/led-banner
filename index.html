<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- viewport-fit=cover lets the background bleed under iOS notch/home-bar.
         Zoom is left enabled (no maximum-scale/user-scalable) for accessibility;
         #stage uses touch-action:manipulation to avoid accidental double-tap
         zoom on the banner. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>LED Banner</title>
    <meta
      name="description"
      content="Scrolling LED-style banner for your phone."
    />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />

    <!-- iOS standalone PWA hints (Add to Home Screen → fullscreen, no chrome) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="LED Banner" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Stage is always live; tapping/activating it while in display mode
         reopens the panel. It's a real button for keyboard + screen-reader
         users (Enter/Space), and its aria-label carries the live message. -->
    <div
      id="stage"
      role="button"
      tabindex="0"
      aria-label="Edit banner settings"
    >
      <div id="banner" aria-hidden="true">PLAY JUNGLE</div>
      <p id="display-hint" aria-hidden="true">Tap to edit</p>
    </div>

    <div id="panel" role="dialog" aria-label="Banner settings">
      <div class="panel-inner">
        <div id="panel-grid">
          <div class="row">
            <label for="text">Banner text</label>
            <input
              id="text"
              type="text"
              value="PLAY JUNGLE"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="characters"
              spellcheck="false"
            />
          </div>

          <div class="colors">
            <div class="row">
              <label for="fg">Text</label>
              <input id="fg" type="color" value="#39ff14" />
            </div>
            <div class="row">
              <label for="bg">Background</label>
              <input id="bg" type="color" value="#000000" />
            </div>
          </div>

          <div class="row">
            <label for="speed">Speed</label>
            <input
              id="speed"
              type="range"
              min="1"
              max="10"
              step="1"
              value="5"
            />
          </div>

          <!-- Primary feature controls (motion, presets) appended here. -->
        </div>

        <!-- Secondary effects collapse here to keep the default panel short. -->
        <details id="more-section">
          <summary>More effects</summary>
          <div id="more-grid"></div>
        </details>

        <p id="contrast-warn" class="warn" role="status" aria-live="polite" hidden></p>

        <button id="go">GO FULLSCREEN ▶</button>
        <p class="hint">Tap the screen anytime to come back here.</p>
      </div>
    </div>

    <script type="module" src="/js/main.js"></script>
  </body>
</html>
