<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- viewport-fit=cover lets the background bleed under iOS notch/home-bar.
         Zoom is left enabled (no maximum-scale/user-scalable) for accessibility;
         #stage uses touch-action:manipulation to avoid accidental double-tap
         zoom on the banner. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>LED Banner</title>
    <meta
      name="description"
      content="Scrolling LED-style banner for your phone."
    />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />

    <!-- iOS standalone PWA hints (Add to Home Screen → fullscreen, no chrome) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="LED Banner" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Stage is always live; tapping/activating it while in display mode
         reopens the panel. It's a real button for keyboard + screen-reader
         users (Enter/Space), and its aria-label carries the live message. -->
    <div
      id="stage"
      role="button"
      tabindex="0"
      aria-label="Edit banner settings"
    >
      <div id="banner" aria-hidden="true">PLAY JUNGLE</div>
      <p id="display-hint" aria-hidden="true">Tap to edit</p>
    </div>

    <div id="panel" role="dialog" aria-label="Banner settings">
      <div class="panel-inner">
        <!-- The message is always visible; styling controls live under tabs. -->
        <div class="row">
          <label for="text">Text</label>
          <input
            id="text"
            type="text"
            value="PLAY JUNGLE"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="characters"
            spellcheck="false"
          />
        </div>

        <div class="tabs" role="tablist" aria-label="Settings">
          <button
            type="button"
            role="tab"
            id="tab-style"
            data-tab="style"
            aria-controls="panel-style"
            aria-selected="true"
          >
            Style
          </button>
          <button
            type="button"
            role="tab"
            id="tab-motion"
            data-tab="motion"
            aria-controls="panel-motion"
            aria-selected="false"
            tabindex="-1"
          >
            Motion
          </button>
          <button
            type="button"
            role="tab"
            id="tab-fx"
            data-tab="fx"
            aria-controls="panel-fx"
            aria-selected="false"
            tabindex="-1"
          >
            Effects
          </button>
        </div>

        <!-- Style tab — colour is here; font + size are appended by features. -->
        <div
          class="tab-panel"
          id="panel-style"
          data-tab="style"
          role="tabpanel"
          aria-labelledby="tab-style"
        >
          <div class="row">
            <label for="fg">Colour</label>
            <div class="swatches">
              <input
                id="fg"
                type="color"
                value="#39ff14"
                aria-label="Text colour"
              />
              <input
                id="bg"
                type="color"
                value="#000000"
                aria-label="Background colour"
              />
            </div>
          </div>
        </div>

        <!-- Speed + motion + direction appended here by the script. -->
        <div
          class="tab-panel"
          id="panel-motion"
          data-tab="motion"
          role="tabpanel"
          aria-labelledby="tab-motion"
          hidden
        ></div>

        <!-- Glow + blink + mirror appended here by the script. -->
        <div
          class="tab-panel"
          id="panel-fx"
          data-tab="fx"
          role="tabpanel"
          aria-labelledby="tab-fx"
          hidden
        ></div>

        <p id="contrast-warn" class="warn" role="status" aria-live="polite" hidden></p>

        <button id="go">GO FULLSCREEN ▶</button>
        <p class="hint">Tap the screen anytime to come back here.</p>
      </div>
    </div>

    <script type="module" src="/js/main.js"></script>
  </body>
</html>
